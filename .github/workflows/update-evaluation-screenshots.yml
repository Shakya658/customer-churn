name: Update evaluation plots

on:
  push:
    branches:
      - master
    paths:
      - assets/evaluation/model_curves.json
      - scripts/export_evaluation_screenshots.py
      - .github/workflows/update-evaluation-screenshots.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-plots:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install matplotlib

      - name: Generate real evaluation plots
        run: |
          python scripts/export_evaluation_screenshots.py
          mkdir -p assets/plots
          mv assets/screenshots/real_roc_curves.png assets/plots/real_roc_curves.png
          mv assets/screenshots/real_precision_recall_curves.png assets/plots/real_precision_recall_curves.png
          sed -i 's#assets/screenshots/real_roc_curves.png#assets/plots/real_roc_curves.png#g' README.md
          sed -i 's#assets/screenshots/real_precision_recall_curves.png#assets/plots/real_precision_recall_curves.png#g' README.md
          sed -i 's/## Evaluation Screenshots/## Evaluation Plots/' README.md

      - name: Commit plots and README
        run: |
          if git diff --quiet -- README.md assets/plots assets/screenshots; then
            echo 'Plots and README already up to date.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A README.md assets/plots assets/screenshots
          git commit -m 'feat: move evaluation charts to plots'
          git push

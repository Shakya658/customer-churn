name: Update evaluation screenshots

on:
  push:
    branches:
      - master
    paths:
      - assets/evaluation/model_curves.json
      - scripts/export_evaluation_screenshots.py
      - scripts/update_readme_screenshots.py
      - .github/workflows/update-evaluation-screenshots.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-screenshots:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install matplotlib

      - name: Generate real evaluation screenshots
        run: python scripts/export_evaluation_screenshots.py

      - name: Embed screenshots in README
        run: python scripts/update_readme_screenshots.py

      - name: Commit screenshots and README
        run: |
          if git diff --quiet -- README.md assets/screenshots/real_roc_curves.png assets/screenshots/real_precision_recall_curves.png; then
            echo 'Screenshots and README already up to date.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md assets/screenshots/real_roc_curves.png assets/screenshots/real_precision_recall_curves.png
          git commit -m 'feat: update real evaluation screenshots'
          git push
